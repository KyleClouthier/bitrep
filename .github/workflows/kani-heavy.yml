# The add-path Kani harnesses decompose a symbolic f64 and shift it across
# the full 34-limb accumulator, which costs CBMC hours rather than minutes.
# They run here on a weekly schedule (and on demand), with a budget to match;
# the fast merge/codec harnesses run in ci.yml on every push.
name: kani-heavy

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

# REALITY CHECK (measured 2026-07-11): add_commutes verifies in ~4 minutes
# on a 16-core/23GB dev box but timed out at 2h55m on a private-repo runner
# (2-core, 7GB RAM — CBMC swaps). Public-repo runners are 4-core/16GB; this
# job is expected to pass once the repo is public. cancellation_is_exact ran
# 11h/23GB locally without closing — it lives under cfg(kani_slow), outside
# CI, until the harness is restructured (e.g. exponent-class case splits).

env:
  CARGO_TERM_COLOR: always

jobs:
  kani-heavy:
    name: kani (add-path harnesses, unbounded budget)
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - name: install kani
        run: cargo install --locked kani-verifier && cargo kani setup
      - name: prove the add-path harness
        run: |
          for h in add_commutes; do
            echo "=== $h ==="
            timeout 10500 cargo kani --no-default-features --harness "$h" | grep "VERIFICATION:- SUCCESSFUL" || exit 1
          done
