# OpenSSF Scorecard — automated supply-chain security posture scoring
# (branch protection, token permissions, pinned actions, dependency update
# tooling, etc.). Results upload to the GitHub code-scanning dashboard and, with
# publish_results, to the public OpenSSF Scorecard API that backs the README badge.
#
# Runs on the default branch only (Scorecard evaluates the default branch) plus
# a weekly schedule so the score tracks over time.
name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "27 5 * * 1" # weekly, Monday 05:27 UTC
  push:
    branches: [main]
  # NB: the Scorecard action only analyzes the repository's DEFAULT branch
  # ("Only the default branch main is supported."), so this workflow cannot be
  # exercised from a feature branch — it is verified by inspection here and runs
  # for real on the first push to main + the weekly schedule.

# Least privilege: only the analysis job widens permissions, and only to what
# the SARIF upload + results publishing require.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code-scanning
      id-token: write # OIDC token to publish results to the Scorecard API
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish to the public OpenSSF API so the README badge populates.
          # The Scorecard API only accepts results from the default branch, so
          # publishing is scoped to main; branch/PR runs still do the full
          # analysis and SARIF upload, just without publishing. (Repo is public.)
          publish_results: ${{ github.ref == 'refs/heads/main' }}
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
