# CodeQL static analysis (SAST).
#
# bitrep is a Rust library with a small Python reference implementation
# (conformance/). CodeQL analyzes both:
#   * rust   — the core crate, bindings, benches, examples (build-mode: none;
#              CodeQL builds the database without compiling)
#   * python — conformance/bitrep_ref.py + conformance/check.py, the independent
#              cross-language oracle
#
# The generated wasm-bindgen JavaScript in bindings/wasm/pkg/ is intentionally
# NOT analyzed: it is machine-generated glue, not hand-written source, so a
# javascript-typescript run would only add noise, not real SAST coverage.
#
# Results upload to the GitHub code-scanning dashboard; OpenSSF Scorecard's SAST
# check credits the presence of CodeQL analysis runs.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "31 4 * * 2" # weekly, Tuesday 04:31 UTC

# Least privilege at the top level; the analyze job widens only to what the
# SARIF upload needs.
permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload CodeQL results to code-scanning
      actions: read # read workflow run metadata (private-repo safe default)
      contents: read # checkout
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:${{ matrix.language }}"
