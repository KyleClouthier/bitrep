# Multi-platform release: build Python wheels (Linux/macOS/Windows, many
# versions) + sdist and publish to PyPI, and build+publish the npm/wasm package.
# Builds run on every push/PR for CI; publishing only happens on a version tag
# (push a tag like `v0.2.1`). Requires repo secrets PYPI_API_TOKEN and NPM_TOKEN.
name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PY_MANIFEST: --manifest-path bindings/python/Cargo.toml

jobs:
  linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist ${{ env.PY_MANIFEST }}
          sccache: "true"
          manylinux: auto
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist ${{ env.PY_MANIFEST }}
          sccache: "true"
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows
          path: dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist ${{ env.PY_MANIFEST }}
          sccache: "true"
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist ${{ env.PY_MANIFEST }}
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist

  publish-pypi:
    name: publish to PyPI (on tag)
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, windows, macos, sdist]
    runs-on: ubuntu-22.04
    # Signed SLSA build provenance for every published wheel + sdist. Keyless
    # (Sigstore OIDC) via actions/attest-build-provenance — no long-lived keys.
    permissions:
      contents: write # attach/associate attestations with the repo
      id-token: write # OIDC identity for keyless Sigstore signing
      attestations: write # write the provenance attestation
    steps:
      - uses: actions/download-artifact@v8
        with: { pattern: "wheels-*", merge-multiple: true, path: dist }
      # Provenance is generated BEFORE upload so the signed digests are exactly
      # the bytes that get published. Verify later with:
      #   gh attestation verify <wheel> --repo KyleClouthier/bitrep
      - name: Generate build provenance for wheels + sdist
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"
      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    name: build + publish npm (on tag)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    # npm publish --provenance emits SLSA provenance to the npm registry
    # (the public "provenance" badge on npmjs.com), and we additionally record
    # a GitHub attestation for the exact tarball. Both are keyless via OIDC.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: wasm32-unknown-unknown }
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build npm package
        run: bash bindings/wasm/build-npm.sh
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Pack tarball and attest its provenance
        working-directory: bindings/wasm/pkg
        run: npm pack
      - name: Generate build provenance for the npm tarball
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "bindings/wasm/pkg/*.tgz"
      - name: Publish (skip if this version is already on npm)
        working-directory: bindings/wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "bitrep@$VER" version >/dev/null 2>&1; then
            echo "bitrep@$VER is already on npm — nothing to publish."
          else
            # --provenance: npm generates + uploads SLSA provenance (needs id-token: write).
            npm publish --access public --provenance
          fi

  attest-crate:
    name: attest crate provenance (on tag)
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    # bitrep is published to crates.io out-of-band (cargo publish). We still
    # record signed provenance for the exact .crate file a tag produces, so a
    # consumer can tie the crates.io artifact back to this commit + workflow.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Package the crate
        run: cargo package -p bitrep --allow-dirty
      - name: Generate build provenance for the .crate
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "target/package/bitrep-*.crate"
