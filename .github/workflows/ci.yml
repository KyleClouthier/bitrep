# bitrep CI — the badge is the claim.
# Golden test vectors (tests/golden.rs) must hash identically on every
# platform in this matrix; a mismatch anywhere fails the build.
name: CI

on:
  push:
    # TEMPORARY: scorecard-hardening added to verify this workflow on the branch.
    # REMOVE `scorecard-hardening` before merge.
    branches: [main, scorecard-hardening]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

# Least privilege: every job here only reads the repo (checkout + build + test).
permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: x86-64 linux,  os: ubuntu-latest }
          - { name: arm64 macos,   os: macos-14 }
          - { name: x86-64 windows, os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (tracks current stable)
      - run: cargo test --all-features
      - run: cargo test --no-default-features

  wasm:
    name: wasm32 (wasmtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (tracks current stable)
        with:
          targets: wasm32-wasip1
      - uses: bytecodealliance/actions/wasmtime/setup@9152e710e9f7182e4c29ad218e4f335a7b203613 # v1.1.3
      - name: run tests under wasmtime
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: wasmtime
        run: cargo test --target wasm32-wasip1

  miri:
    name: miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae # nightly branch (tracks current nightly)
        with:
          components: miri
      - name: miri (deterministic + golden + NIST suites)
        # Property tests under miri are too slow; the deterministic suites
        # exercise every code path the properties do.
        run: |
          cargo +nightly miri test --test golden
          cargo +nightly miri test --test nist_strd
          cargo +nightly miri test --doc

  lint:
    name: clippy + fmt + docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (tracks current stable)
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: msrv (1.74)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master branch
        with:
          toolchain: "1.74"
      - run: cargo build --all-features

  lean-proofs:
    name: lean proofs (zero sorry, axiom audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: install elan (Lean toolchain)
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain leanprover/lean4:v4.31.0
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - run: bash proofs/check.sh

  comparator:
    # Independent adversarial-grade check of the Lean proofs using the Lean
    # FRO's comparator (github.com/leanprover/comparator): guarantees that
    # Solution.lean proves EXACTLY the statements in the trusted spec
    # proofs/comparator/Challenge.lean, uses only the standard axiom base
    # (propext / Quot.sound / Classical.choice), and that every proof replays
    # in the Lean kernel. Additive to (not a replacement for) `lean-proofs`,
    # which stays the source of truth for the audited theorem list.
    #
    # The comparator README wraps the run in systemd-run to defend against an
    # ADVERSARIAL Solution file. Our Solution.lean is our own code (CI checks
    # it is byte-for-byte the concatenation of the four proof files), so
    # running comparator directly — without systemd-run — is acceptable here.
    name: comparator (statement match + axiom audit + kernel replay)
    runs-on: ubuntu-latest
    env:
      # Both Lean tools must be version-compatible with the project toolchain
      # in proofs/comparator/lean-toolchain (leanprover/lean4:v4.31.0):
      # lean4export loads the .olean files that toolchain produces.
      LEAN4EXPORT_REF: v4.31.0
      COMPARATOR_REF: master # comparator has no releases; master is the branch the Lean FRO ships
      LANDRUN_REF: main      # comparator requires landrun built from main-branch source
      DEPS: ${{ github.workspace }}/.comparator-deps
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Guard: the Solution comparator checks must be exactly the proofs the
      # rest of the repo (and the lean-proofs job) reasons about.
      - name: Solution.lean is byte-for-byte the four proof files
        run: |
          cat proofs/OrderInvariance.lean proofs/RoundNearestEven.lean \
              proofs/FloatGCounter.lean proofs/ToolkitAlgebra.lean \
            | diff -u - proofs/comparator/Solution.lean

      # Guard: the comparator must cover exactly the theorems check.sh audits
      # (check.sh remains the source of truth for the theorem list).
      - name: config.json lists exactly the theorems audited by check.sh
        run: |
          grep -oP '(?<=^#print axioms )Bitrep\.[A-Za-z0-9_.]+' proofs/check.sh \
            | sort > /tmp/audited.txt
          jq -r '.theorem_names[]' proofs/comparator/config.json \
            | sort > /tmp/config.txt
          diff -u /tmp/audited.txt /tmp/config.txt
          echo "OK: $(wc -l < /tmp/audited.txt) theorems covered"

      - name: install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: stable
          # No go.sum in this repo (landrun is cloned below); the action's
          # built-in module cache would only emit a warning.
          cache: false

      - name: resolve dependency commits (cache keys)
        id: deps
        run: |
          echo "comparator-sha=$(git ls-remote https://github.com/leanprover/comparator.git "$COMPARATOR_REF" | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "lean4export-sha=$(git ls-remote https://github.com/leanprover/lean4export.git "refs/tags/$LEAN4EXPORT_REF" | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: cache comparator build
        id: cache-comparator
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ env.DEPS }}/comparator
          key: comparator-${{ steps.deps.outputs.comparator-sha }}

      - name: cache lean4export build
        id: cache-lean4export
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ${{ env.DEPS }}/lean4export
          key: lean4export-${{ steps.deps.outputs.lean4export-sha }}

      - name: build landrun (Landlock sandbox comparator shells out to)
        run: |
          git clone --depth 1 --branch "$LANDRUN_REF" https://github.com/Zouuup/landrun.git "$DEPS/landrun"
          cd "$DEPS/landrun"
          go build -o landrun cmd/landrun/main.go
          ./landrun --version || true

      - name: build comparator (its own pinned toolchain, via elan)
        if: steps.cache-comparator.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$COMPARATOR_REF" https://github.com/leanprover/comparator.git "$DEPS/comparator"
          cd "$DEPS/comparator"
          lake build comparator

      - name: build lean4export (tag matching the proofs toolchain)
        if: steps.cache-lean4export.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$LEAN4EXPORT_REF" https://github.com/leanprover/lean4export.git "$DEPS/lean4export"
          cd "$DEPS/lean4export"
          lake build

      - name: run comparator on the bitrep proofs
        working-directory: proofs/comparator
        run: |
          export COMPARATOR_LANDRUN="$DEPS/landrun/landrun"
          export COMPARATOR_LEAN4EXPORT="$DEPS/lean4export/.lake/build/bin/lean4export"
          lake env "$DEPS/comparator/.lake/build/bin/comparator" config.json

  conformance:
    name: cross-language conformance (Python reference)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (tracks current stable)
      - name: regenerate vectors from the Rust crate
        run: cargo run --example gen_vectors
      - name: vectors must be unchanged (Rust output is canonical)
        run: git diff --exit-code conformance/vectors.json
      - name: the pure-Python reference must reproduce them byte-for-byte
        run: python3 conformance/check.py

  kani:
    name: kani (merge + codec harnesses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: install kani
        run: cargo install --locked kani-verifier && cargo kani setup
      # These three are fixed-shape limb arithmetic and solve in seconds to
      # minutes. The add-path harnesses (add_commutes, cancellation_is_exact)
      # decompose a symbolic f64 and shift across the whole accumulator —
      # hours for CBMC, so they are gated behind cfg(kani_slow) for local runs.
      - name: prove harnesses (each individually, bounded)
        run: |
          for h in merge_commutes merge_associates bytes_roundtrip extrema_merge_commutes extrema_merge_associates extrema_bytes_roundtrip; do
            echo "=== $h ==="
            timeout 1500 cargo kani --no-default-features --harness "$h" | grep "VERIFICATION:- SUCCESSFUL" || exit 1
          done
