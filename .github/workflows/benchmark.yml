# Benchmark regression tracking.
#
# benches/reductions.rs is a criterion suite (bitrep vs naive/Kahan/xsum). This
# job runs it, emits the libtest "bencher" format criterion can produce, and
# feeds it to github-action-benchmark, which keeps a time series (pushed to the
# gh-pages branch on main) and alerts on regressions. Non-blocking to start:
# fail-on-alert is false, so a slow runner never reds the build — it comments.
name: benchmark

on:
  push:
    branches: [main, ci-supplychain] # TEMPORARY: remove ci-supplychain before merge
  pull_request:

permissions:
  contents: write # github-action-benchmark stores the series on gh-pages (main only)

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: criterion (regression tracking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: run criterion benches (bencher output)
        # criterion's --output-format bencher emits the libtest bench lines
        # github-action-benchmark's `cargo` parser understands.
        run: cargo bench --bench reductions -- --output-format bencher | tee output.txt
      - name: track / alert on regressions
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Comment on the commit/PR when a result regresses past the threshold,
          # but do not fail the build (start observability-only, tighten later).
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: false
          summary-always: true
          # Persist the time series only on the default branch.
          auto-push: ${{ github.ref == 'refs/heads/main' }}
