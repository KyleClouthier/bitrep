# Benchmark regression tracking.
#
# benches/reductions.rs is a criterion suite (bitrep vs naive/Kahan/xsum). This
# job runs it, emits the libtest "bencher" format criterion can produce, and
# feeds it to github-action-benchmark, which keeps a time series (pushed to the
# gh-pages branch on main) and alerts on regressions. Non-blocking to start:
# fail-on-alert is false, so a slow runner never reds the build — it comments.
name: benchmark

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: default read-only; only the bench job widens to contents:write,
# and only it needs it (github-action-benchmark pushes the series to gh-pages on main).
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    name: criterion (regression tracking)
    runs-on: ubuntu-latest
    permissions:
      contents: write # github-action-benchmark stores the series on gh-pages (main only)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch (tracks current stable)
      # Always run the suite: this alone proves the benches still compile and
      # execute (a real regression guard against bit-rotted benchmarks).
      # criterion's --output-format bencher emits the libtest bench lines
      # github-action-benchmark's `cargo` parser understands.
      - name: run criterion benches (bencher output)
        run: cargo bench --bench reductions -- --output-format bencher | tee output.txt
      # Time-series storage + regression alerting. github-action-benchmark keeps
      # its history on a `gh-pages` branch and always switches to it, so it can
      # only run where that branch exists: on main (store + push) and on PRs
      # (compare + comment). It is intentionally skipped on other branch pushes
      # so this job stays green pre-bootstrap.
      # OWNER SETUP (one-time): create an empty `gh-pages` branch, e.g.
      #   git switch --orphan gh-pages && git commit --allow-empty -m init && git push -u origin gh-pages
      # Until then the tracking step is dormant; the bench run above still gates.
      - name: track / alert on regressions
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
        with:
          tool: cargo
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Comment on the commit/PR when a result regresses past the threshold,
          # but do not fail the build (start observability-only, tighten later).
          alert-threshold: "200%"
          comment-on-alert: true
          fail-on-alert: false
          summary-always: true
          # Persist the series only on the default branch; PRs compare + comment.
          auto-push: ${{ github.ref == 'refs/heads/main' }}
